<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script type="text/javascript" src="./js/script.js" defer></script>

    <title>Odin Calculator</title>
</head>

<body>
    <div class="content">

        <img src="./img/logo.png" alt="Project logo. Represents odin with the project name.">

        <div class="calculator roundBorder">

            <div class="display output roundBorder">
                0
            </div>
            <div class="display input roundBorder">
                0
            </div>

            <div class="row roundBorder">
                <div id="ac" class="button roundBorder operator">
                    AC
                </div>
                <div id="square" class="button roundBorder operator">
                    √x
                </div>
                <div id="exp2" class="button roundBorder operator">
                    x&sup2;
                </div>
                <div id="division" class="button roundBorder operator">
                    ÷
                </div>
            </div>
            <div class="row roundBorder">
                <div id="seven" class="button roundBorder operand">
                    7
                </div>
                <div id="eigth" class="button roundBorder operand">
                    8
                </div>
                <div id="nine" class="button roundBorder operand">
                    9
                </div>
                <div id="mult" class="button roundBorder operator">
                    ×
                </div>
            </div>
            <div class="row roundBorder">
                <div id="four" class="button roundBorder operand">
                    4
                </div>
                <div id="five" class="button roundBorder operand">
                    5
                </div>
                <div id="six" class="button roundBorder operand">
                    6
                </div>
                <div id="minus" class="button roundBorder operator">
                    -
                </div>
            </div>
            <div class="row roundBorder">
                <div id="one" class="button roundBorder operand">
                    1
                </div>
                <div id="two" class="button roundBorder operand">
                    2
                </div>
                <div id="three" class="button roundBorder operand">
                    3
                </div>
                <div id="plus" class="button roundBorder operator">
                    +
                </div>
            </div>
            <div class="row roundBorder">
                <div id="sign" class="button roundBorder operand">
                    +/−
                </div>
                <div id="zero" class="button roundBorder operand">
                    0
                </div>
                <div id="dot" class="button roundBorder operand">
                    .
                </div>
                <div id="equal" class="button roundBorder operator">
                    =
                </div>
            </div>

        </div>

    </div>
</body>

</html>
